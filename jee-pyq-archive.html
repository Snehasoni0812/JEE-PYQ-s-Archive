<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>JEE PYQ Archive — Physics · Chemistry · Maths</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Special+Elite&family=Lora:ital,wght@0,400;0,500;0,600;0,700;1,400&family=IBM+Plex+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{
  --ink:#1b2a4a;
  --ink-2:#233355;
  --paper:#efe9d9;
  --paper-2:#f7f3e6;
  --card:#fbf8f0;
  --physics:#2e5eaa;
  --physics-tint:#e4ecf9;
  --chem:#2f8f5b;
  --chem-tint:#e3f2e9;
  --maths:#c77d26;
  --maths-tint:#f8ecd9;
  --stamp:#b23a3a;
  --text:#23262b;
  --muted:#6b6456;
  --line:#d8cfb8;
  --correct:#2f8f5b;
  --wrong:#b23a3a;
  --font-display:'Special Elite', monospace;
  --font-body:'Lora', serif;
  --font-mono:'IBM Plex Mono', monospace;
  --radius:3px;
}
*{box-sizing:border-box;}
html,body{margin:0;padding:0;}
body{
  background:var(--paper);
  color:var(--text);
  font-family:var(--font-body);
  min-height:100vh;
  background-image:
    linear-gradient(var(--line) 1px, transparent 1px);
  background-size: 100% 32px;
  background-attachment:local;
}
a{color:inherit;}
button{font-family:inherit;cursor:pointer;}
::selection{background:var(--maths-tint);}

/* ---------- Header / hall ticket strip ---------- */
header.hallticket{
  background:var(--ink);
  color:var(--paper-2);
  border-bottom:4px solid var(--stamp);
  position:sticky;top:0;z-index:50;
}
.hallticket-inner{
  max-width:1240px;margin:0 auto;
  display:flex;align-items:center;justify-content:space-between;
  padding:14px 24px;gap:16px;flex-wrap:wrap;
}
.wordmark{display:flex;align-items:center;gap:12px;}
.wordmark .stamp{
  width:44px;height:44px;border:2px solid var(--stamp);
  color:var(--stamp);border-radius:50%;
  display:flex;align-items:center;justify-content:center;
  font-family:var(--font-mono);font-weight:700;font-size:11px;
  transform:rotate(-8deg);
  background:rgba(178,58,58,0.08);
  letter-spacing:0.5px;text-align:center;line-height:1.1;
}
.wordmark h1{
  font-family:var(--font-display);
  font-size:19px;letter-spacing:0.5px;margin:0;
  font-weight:400;
}
.wordmark .sub{
  font-family:var(--font-mono);font-size:11px;color:#b9c3dc;
  margin-top:2px;letter-spacing:1px;text-transform:uppercase;
}
nav.tabs{display:flex;gap:4px;background:var(--ink-2);border-radius:4px;padding:4px;}
nav.tabs button{
  background:transparent;border:none;color:#c6cfe6;
  font-family:var(--font-mono);font-size:12.5px;letter-spacing:0.4px;
  padding:8px 14px;border-radius:3px;text-transform:uppercase;
  transition:background .15s,color .15s;
}
nav.tabs button:hover{color:#fff;}
nav.tabs button.active{background:var(--paper-2);color:var(--ink);font-weight:600;}

/* ---------- Layout ---------- */
.wrap{max-width:1240px;margin:0 auto;padding:28px 24px 80px;}
.grid{display:grid;grid-template-columns:270px 1fr;gap:26px;align-items:start;}
@media (max-width:880px){.grid{grid-template-columns:1fr;}}

/* ---------- Sidebar ---------- */
.sidebar{
  background:var(--card);
  border:1px solid var(--line);
  border-radius:var(--radius);
  padding:18px;
  position:sticky;top:96px;
}
.sidebar h3{
  font-family:var(--font-mono);font-size:11px;letter-spacing:1.4px;
  text-transform:uppercase;color:var(--muted);margin:0 0 10px;
  border-bottom:1px dashed var(--line);padding-bottom:8px;
}
.subject-pills{display:flex;flex-direction:column;gap:6px;margin-bottom:20px;}
.pill{
  display:flex;align-items:center;justify-content:space-between;
  padding:9px 12px;border:1.5px solid var(--line);border-radius:3px;
  font-family:var(--font-mono);font-size:12.5px;font-weight:500;
  background:var(--paper-2);
}
.pill .count{font-size:11px;color:var(--muted);}
.pill.active[data-subj="Physics"]{border-color:var(--physics);background:var(--physics-tint);color:var(--physics);}
.pill.active[data-subj="Chemistry"]{border-color:var(--chem);background:var(--chem-tint);color:var(--chem);}
.pill.active[data-subj="Maths"]{border-color:var(--maths);background:var(--maths-tint);color:var(--maths);}
.pill.active[data-subj="All"]{border-color:var(--ink);background:var(--ink);color:var(--paper-2);}
.pill{transition:all .12s;}

.exam-radio label{
  display:flex;align-items:center;gap:8px;font-size:13px;padding:5px 2px;cursor:pointer;
}
.exam-radio input{accent-color:var(--ink);}

.year-strip{
  display:flex;overflow-x:auto;gap:4px;padding-bottom:6px;margin-bottom:4px;
  scrollbar-width:thin;
}
.year-chip{
  flex:0 0 auto;font-family:var(--font-mono);font-size:11px;
  border:1px solid var(--line);padding:5px 8px;border-radius:2px;
  background:var(--paper-2);color:var(--muted);white-space:nowrap;
}
.year-chip.active{background:var(--ink);color:var(--paper-2);border-color:var(--ink);}

.topic-chips{display:flex;flex-wrap:wrap;gap:6px;}
.topic-chip{
  font-size:11.5px;font-family:var(--font-mono);
  border:1px solid var(--line);padding:5px 9px;border-radius:20px;
  background:var(--paper-2);color:var(--text);
}
.topic-chip.active{background:var(--ink);color:var(--paper-2);border-color:var(--ink);}

.reset-link{
  margin-top:16px;font-size:11.5px;font-family:var(--font-mono);
  color:var(--stamp);text-decoration:underline;background:none;border:none;padding:0;
}

/* ---------- Question card ---------- */
.qmeta{
  display:flex;align-items:center;gap:10px;flex-wrap:wrap;
  font-family:var(--font-mono);font-size:11.5px;color:var(--muted);
  margin-bottom:10px;
}
.qmeta .tag{
  padding:3px 9px;border-radius:20px;border:1px solid var(--line);
  text-transform:uppercase;letter-spacing:0.4px;
}
.progress-line{
  font-family:var(--font-mono);font-size:12px;color:var(--muted);margin-bottom:14px;
}

.qcard{
  background:var(--card);
  border:1px solid var(--line);
  border-radius:var(--radius);
  padding:26px 28px 22px;
  position:relative;
  box-shadow:0 1px 0 var(--line);
}
.qcard::before{
  content:"";position:absolute;top:0;left:24px;right:24px;height:1px;
  background:repeating-linear-gradient(90deg, var(--line) 0 6px, transparent 6px 12px);
}
.qnum{
  font-family:var(--font-mono);font-weight:700;font-size:13px;
  color:var(--ink);margin-bottom:10px;
}
.qtext{font-size:17px;line-height:1.65;margin:0 0 20px;color:var(--text);}
.options{display:flex;flex-direction:column;gap:10px;margin-bottom:20px;}
.option{
  display:flex;align-items:center;gap:12px;
  padding:11px 14px;border:1.5px solid var(--line);border-radius:3px;
  background:var(--paper-2);font-size:14.5px;transition:all .12s;
}
.option:hover{border-color:var(--ink);}
.omr{
  width:26px;height:26px;border-radius:50%;border:2px solid var(--muted);
  flex:0 0 auto;display:flex;align-items:center;justify-content:center;
  font-family:var(--font-mono);font-size:12px;font-weight:700;color:var(--muted);
  transition:all .12s;
}
.option.selected .omr{background:var(--ink);border-color:var(--ink);color:#fff;}
.option.selected{border-color:var(--ink);background:#fff;}
.option.correct{border-color:var(--correct);background:var(--chem-tint);}
.option.correct .omr{background:var(--correct);border-color:var(--correct);color:#fff;}
.option.wrong{border-color:var(--wrong);background:#fbe9e9;}
.option.wrong .omr{background:var(--wrong);border-color:var(--wrong);color:#fff;}

.qactions{display:flex;gap:10px;flex-wrap:wrap;align-items:center;}
.btn{
  font-family:var(--font-mono);font-size:12px;letter-spacing:0.4px;text-transform:uppercase;
  padding:10px 16px;border-radius:3px;border:1.5px solid var(--ink);background:var(--ink);color:#fff;
  font-weight:600;
}
.btn.secondary{background:transparent;color:var(--ink);}
.btn.ghost{border-color:var(--line);color:var(--muted);background:var(--paper-2);}
.btn:disabled{opacity:.4;cursor:not-allowed;}
.btn.bookmarked{background:var(--maths);border-color:var(--maths);}

.solution-box{
  margin-top:18px;padding:16px 18px;background:#fff;border:1px dashed var(--line);border-radius:3px;
  font-size:14px;line-height:1.6;
}
.solution-box .stamp-label{
  display:inline-block;font-family:var(--font-mono);font-size:10.5px;font-weight:700;
  color:var(--stamp);border:1px solid var(--stamp);padding:2px 8px;border-radius:2px;
  margin-bottom:10px;letter-spacing:1px;
}

/* ---------- Mock test ---------- */
.setup-card{
  background:var(--card);border:1px solid var(--line);border-radius:var(--radius);
  padding:28px;max-width:560px;
}
.setup-card h2{font-family:var(--font-display);font-weight:400;font-size:22px;margin:0 0 6px;}
.setup-card p.desc{color:var(--muted);font-size:13.5px;margin:0 0 22px;}
.form-row{margin-bottom:18px;}
.form-row label{
  display:block;font-family:var(--font-mono);font-size:11px;text-transform:uppercase;
  letter-spacing:1px;color:var(--muted);margin-bottom:8px;
}
.check-row{display:flex;gap:14px;flex-wrap:wrap;}
.check-row label{
  display:flex;align-items:center;gap:6px;font-family:var(--font-body);font-size:14px;
  text-transform:none;letter-spacing:0;color:var(--text);
}
select, input[type=number]{
  font-family:var(--font-mono);font-size:13px;padding:8px 10px;border:1.5px solid var(--line);
  border-radius:3px;background:var(--paper-2);color:var(--text);
}

.exam-header{
  display:flex;justify-content:space-between;align-items:center;
  background:var(--ink);color:#fff;padding:12px 20px;border-radius:3px;margin-bottom:20px;
  flex-wrap:wrap;gap:10px;
}
.clock{
  font-family:var(--font-mono);font-size:22px;font-weight:700;letter-spacing:1px;
  background:var(--ink-2);padding:6px 14px;border-radius:3px;border:1px solid #3a4a72;
}
.clock.low{color:var(--stamp);}

.mock-layout{display:grid;grid-template-columns:1fr 250px;gap:22px;}
@media (max-width:880px){.mock-layout{grid-template-columns:1fr;}}
.palette{
  background:var(--card);border:1px solid var(--line);border-radius:var(--radius);padding:16px;
  position:sticky;top:96px;
}
.palette h4{font-family:var(--font-mono);font-size:11px;text-transform:uppercase;color:var(--muted);margin:0 0 10px;letter-spacing:1px;}
.palette-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:6px;margin-bottom:14px;}
.pnode{
  aspect-ratio:1;border-radius:3px;border:1px solid var(--line);
  font-family:var(--font-mono);font-size:11px;font-weight:700;
  display:flex;align-items:center;justify-content:center;background:var(--paper-2);color:var(--muted);
}
.pnode.current{outline:2px solid var(--ink);outline-offset:1px;}
.pnode.answered{background:var(--correct);color:#fff;border-color:var(--correct);}
.pnode.marked{background:var(--maths);color:#fff;border-color:var(--maths);}
.legend{font-size:11px;font-family:var(--font-mono);color:var(--muted);display:flex;flex-direction:column;gap:5px;}
.legend span.dot{display:inline-block;width:9px;height:9px;border-radius:2px;margin-right:6px;vertical-align:middle;}

.results-card{background:var(--card);border:1px solid var(--line);border-radius:var(--radius);padding:30px;text-align:center;max-width:640px;margin:0 auto;}
.score-big{font-family:var(--font-display);font-size:52px;color:var(--ink);margin:6px 0;}
.results-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin:24px 0;text-align:left;}
.rbox{border:1px solid var(--line);border-radius:3px;padding:12px;background:var(--paper-2);}
.rbox .label{font-family:var(--font-mono);font-size:10px;text-transform:uppercase;color:var(--muted);letter-spacing:0.6px;}
.rbox .val{font-family:var(--font-mono);font-size:20px;font-weight:700;margin-top:4px;}

/* ---------- Bookmarks / Stats ---------- */
.list-card{background:var(--card);border:1px solid var(--line);border-radius:var(--radius);padding:16px 18px;margin-bottom:10px;}
.list-card .meta{font-family:var(--font-mono);font-size:11px;color:var(--muted);margin-bottom:6px;}
.list-card .qshort{font-size:14.5px;line-height:1.5;margin-bottom:8px;}
.empty{
  text-align:center;padding:60px 20px;color:var(--muted);font-family:var(--font-mono);font-size:13px;
}
.stats-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-bottom:28px;}
@media (max-width:700px){.stats-grid{grid-template-columns:repeat(2,1fr);}}
.stat-card{background:var(--card);border:1px solid var(--line);border-radius:var(--radius);padding:18px;text-align:center;}
.stat-card .num{font-family:var(--font-mono);font-size:28px;font-weight:700;color:var(--ink);}
.stat-card .lbl{font-family:var(--font-mono);font-size:10.5px;text-transform:uppercase;color:var(--muted);letter-spacing:0.6px;margin-top:4px;}
.bar-row{display:flex;align-items:center;gap:12px;margin-bottom:12px;}
.bar-row .name{width:90px;font-family:var(--font-mono);font-size:12px;}
.bar-track{flex:1;height:10px;background:var(--line);border-radius:6px;overflow:hidden;}
.bar-fill{height:100%;border-radius:6px;}
.bar-row .pct{width:44px;text-align:right;font-family:var(--font-mono);font-size:12px;color:var(--muted);}

.notice{
  font-size:12.5px;color:var(--muted);background:var(--paper-2);border:1px dashed var(--line);
  border-radius:3px;padding:12px 14px;margin-bottom:22px;line-height:1.6;
}
.notice b{color:var(--text);}

footer{
  text-align:center;padding:30px 20px;font-family:var(--font-mono);font-size:11px;color:var(--muted);
}
</style>
</head>
<body>

<header class="hallticket">
  <div class="hallticket-inner">
    <div class="wordmark">
      <div class="stamp">EST<br>1961</div>
      <div>
        <h1>JEE PYQ Archive</h1>
        <div class="sub">Physics · Chemistry · Mathematics — 1978–2026</div>
      </div>
    </div>
    <nav class="tabs" id="tabs">
      <button data-view="practice" class="active">Practice</button>
      <button data-view="mocktest">Mock Test</button>
      <button data-view="bookmarks">Bookmarks</button>
      <button data-view="stats">Stats</button>
    </nav>
  </div>
</header>

<div class="wrap" id="app"></div>

<footer>Built as a practice tool · not affiliated with NTA or the IITs</footer>

<script>
/* ================= QUESTION BANK ================= */
/* A curated sample set spanning old IIT-JEE, AIEEE/JEE Main and JEE Advanced eras.
   Written to be representative of real exam style and difficulty — not verbatim
   reproductions of any copyrighted paper. Meant as a seed set to demonstrate the
   platform; expand the QUESTIONS array with real archived papers as you gather them. */
const QUESTIONS = [
// ---------------- PHYSICS ----------------
{id:'ph1',subject:'Physics',exam:'IIT-JEE',year:1983,topic:'Mechanics',difficulty:'Medium',
 q:'A block of mass 2 kg rests on a rough horizontal surface (μ = 0.4). A horizontal force of 10 N is applied. Taking g = 10 m/s², the acceleration of the block is:',
 options:['1 m/s²','2 m/s²','5 m/s²','Zero, block remains stationary'],answer:0,
 solution:'Max static friction ≈ μmg = 0.4×2×10 = 8 N. Applied force 10 N > 8 N, so the block moves. Net force = 10 − 8 = 2 N. a = F/m = 2/2 = 1 m/s².'},
{id:'ph2',subject:'Physics',exam:'IIT-JEE',year:1991,topic:'Electrostatics',difficulty:'Medium',
 q:'Two point charges +q and −q are separated by a distance 2a. The electric field at a point on the perpendicular bisector at distance r (r ≫ a) from the midpoint, along the axis of the dipole, is proportional to:',
 options:['1/r','1/r²','1/r³','r'],answer:2,
 solution:'For an ideal dipole, the field at large distances falls off as 1/r³ (dipole field), unlike a single point charge which falls as 1/r².'},
{id:'ph3',subject:'Physics',exam:'IIT-JEE',year:1998,topic:'Optics',difficulty:'Hard',
 q:'In Young’s double slit experiment, the slit separation is doubled and the screen distance is halved. The fringe width becomes:',
 options:['4 times','2 times','1/2 times','1/4 times'],answer:3,
 solution:'Fringe width β = λD/d. Doubling d and halving D: β′ = λ(D/2)/(2d) = (1/4)(λD/d) = β/4.'},
{id:'ph4',subject:'Physics',exam:'IIT-JEE',year:2004,topic:'Thermodynamics',difficulty:'Medium',
 q:'An ideal gas undergoes an isothermal expansion. Which of the following remains constant?',
 options:['Pressure','Internal energy','Entropy','Volume'],answer:1,
 solution:'For an ideal gas, internal energy depends only on temperature. Since the process is isothermal, ΔU = 0, so internal energy stays constant.'},
{id:'ph5',subject:'Physics',exam:'AIEEE',year:2006,topic:'Current Electricity',difficulty:'Easy',
 q:'A wire of resistance R is stretched to double its length. Its new resistance becomes:',
 options:['R/2','R','2R','4R'],answer:3,
 solution:'Volume is conserved: A₁L₁ = A₂L₂. If L doubles, A halves. R = ρL/A, so R′ = ρ(2L)/(A/2) = 4ρL/A = 4R.'},
{id:'ph6',subject:'Physics',exam:'AIEEE',year:2010,topic:'Modern Physics',difficulty:'Medium',
 q:'In a photoelectric experiment, the stopping potential is found to be independent of:',
 options:['Frequency of incident light','Intensity of incident light','Work function of metal','Nature of the metal surface'],answer:1,
 solution:'Stopping potential depends on frequency (via Einstein’s equation) and work function, but not on intensity — intensity only affects the number of photoelectrons, not their maximum kinetic energy.'},
{id:'ph7',subject:'Physics',exam:'JEE Main',year:2015,topic:'Rotational Motion',difficulty:'Hard',
 q:'A uniform disc of mass M and radius R rolls without slipping down an incline of height h. Its speed at the bottom is:',
 options:['√(2gh)','√(4gh/3)','√(3gh/4)','√(gh)'],answer:1,
 solution:'Energy conservation: Mgh = ½Mv² + ½Iω², with I = ½MR² and ω = v/R. This gives Mgh = ¾Mv², so v = √(4gh/3).'},
{id:'ph8',subject:'Physics',exam:'JEE Advanced',year:2017,topic:'Waves',difficulty:'Hard',
 q:'A string of length L is fixed at both ends and vibrates in its third harmonic. The number of nodes (excluding the ends) is:',
 options:['1','2','3','4'],answer:1,
 solution:'The nth harmonic of a string fixed at both ends has (n+1) nodes total, including the two ends. Third harmonic: 4 nodes total, so 2 nodes excluding the ends.'},
{id:'ph9',subject:'Physics',exam:'JEE Main',year:2021,topic:'Magnetism',difficulty:'Medium',
 q:'A charged particle moves in a circular path in a uniform magnetic field. If the speed of the particle is doubled while the field is kept constant, the radius of the path:',
 options:['Remains the same','Doubles','Halves','Quadruples'],answer:1,
 solution:'r = mv/(qB). With q, B, m constant, r ∝ v. Doubling v doubles r.'},
{id:'ph10',subject:'Physics',exam:'JEE Advanced',year:2023,topic:'Electrostatics',difficulty:'Hard',
 q:'A parallel plate capacitor is charged and then isolated. A dielectric slab (K = 4) is inserted, filling the gap completely. The energy stored in the capacitor:',
 options:['Increases 4 times','Becomes 1/4 of original','Doubles','Remains unchanged'],answer:1,
 solution:'Charge Q is fixed (isolated). U = Q²/(2C), and C increases by factor K = 4 when the dielectric is inserted. So U becomes U/4.'},
{id:'ph11',subject:'Physics',exam:'JEE Main',year:2026,topic:'Kinematics',difficulty:'Easy',
 q:'A ball is thrown vertically upward with speed 20 m/s. Taking g = 10 m/s², the time taken to reach maximum height is:',
 options:['1 s','2 s','3 s','4 s'],answer:1,
 solution:'At max height, v = 0. Using v = u − gt: 0 = 20 − 10t, so t = 2 s.'},
{id:'ph12',subject:'Physics',exam:'IIT-JEE',year:1988,topic:'Gravitation',difficulty:'Hard',
 q:'A satellite revolves close to the surface of a planet. If the density of the planet is ρ, the orbital period of the satellite depends on:',
 options:['ρ and radius of planet','Only ρ','Only radius of planet','Neither ρ nor radius'],answer:1,
 solution:'For a satellite orbiting close to the surface, T = √(3π/Gρ), which depends only on the density of the planet, not its radius.'},

// ---------------- CHEMISTRY ----------------
{id:'ch1',subject:'Chemistry',exam:'IIT-JEE',year:1984,topic:'Atomic Structure',difficulty:'Medium',
 q:'The number of unpaired electrons in the ground state of Fe³⁺ (Z = 26) is:',
 options:['3','4','5','6'],answer:2,
 solution:'Fe³⁺ has configuration [Ar]3d⁵. All five 3d electrons are unpaired (Hund’s rule), giving 5 unpaired electrons.'},
{id:'ch2',subject:'Chemistry',exam:'IIT-JEE',year:1990,topic:'Chemical Equilibrium',difficulty:'Hard',
 q:'For the reaction N₂(g) + 3H₂(g) ⇌ 2NH₃(g), increasing the pressure at constant temperature shifts the equilibrium:',
 options:['Towards reactants','Towards products','No shift occurs','Cannot be determined'],answer:1,
 solution:'By Le Chatelier’s principle, increasing pressure favours the side with fewer gas moles. Reactants have 4 mol gas, products have 2 mol, so equilibrium shifts towards products (NH₃).'},
{id:'ch3',subject:'Chemistry',exam:'IIT-JEE',year:1997,topic:'Organic Chemistry',difficulty:'Hard',
 q:'Which of the following carbocations is most stable?',
 options:['Primary carbocation','Secondary carbocation','Tertiary carbocation','Methyl cation'],answer:2,
 solution:'Tertiary carbocations are stabilised by hyperconjugation and the inductive (+I) effect of three alkyl groups, making them more stable than secondary, primary, or methyl cations.'},
{id:'ch4',subject:'Chemistry',exam:'IIT-JEE',year:2003,topic:'Electrochemistry',difficulty:'Medium',
 q:'In a galvanic cell, oxidation occurs at the:',
 options:['Cathode','Anode','Salt bridge','Both electrodes equally'],answer:1,

/* ================= PERSISTENCE ================= */
const DEFAULT_PROGRESS = { bookmarks: [], attempts: {}, mockHistory: [] };
let progress = JSON.parse(JSON.stringify(DEFAULT_PROGRESS));

async function loadProgress(){
  try{
    const res = await window.storage.get('progress', false);
    if(res && res.value){ progress = JSON.parse(res.value); }
  }catch(e){ /* no saved progress yet — use defaults */ }
}
async function saveProgress(){
  try{ await window.storage.set('progress', JSON.stringify(progress), false); }
  catch(e){ console.error('Save failed', e); }
}

/* ================= STATE ================= */
let view = 'practice';
let filters = { subject:'All', exam:'All', year:'All', topic:'All' };
let practiceIndex = 0;
let selected = {}; // qid -> option index chosen (practice mode)
let revealed = {}; // qid -> bool

let mock = {
  active:false, setup:true, questions:[], index:0, answers:{}, marked:{},
  duration:0, timeLeft:0, timerId:null, submitted:false, result:null
};

const SUBJ_COLOR = { Physics:'var(--physics)', Chemistry:'var(--chem)', Maths:'var(--maths)' };

/* ================= HELPERS ================= */
function filteredQuestions(){
  return QUESTIONS.filter(q=>{
    if(filters.subject!=='All' && q.subject!==filters.subject) return false;
    if(filters.exam!=='All' && q.exam!==filters.exam) return false;
    if(filters.year!=='All' && q.year!==filters.year) return false;
    if(filters.topic!=='All' && q.topic!==filters.topic) return false;
    return true;
  });
}
function years(){ return [...new Set(QUESTIONS.map(q=>q.year))].sort((a,b)=>a-b); }
function topicsFor(subject){
  const src = subject==='All'?QUESTIONS:QUESTIONS.filter(q=>q.subject===subject);
  return [...new Set(src.map(q=>q.topic))].sort();
}
function subjCount(s){ return s==='All'?QUESTIONS.length:QUESTIONS.filter(q=>q.subject===s).length; }
function esc(s){ const d=document.createElement('div'); d.textContent=s; return d.innerHTML; }

/* ================= RENDER ROOT ================= */
function render(){
  document.querySelectorAll('#tabs button').forEach(b=>{
    b.classList.toggle('active', b.dataset.view===view);
  });
  const app = document.getElementById('app');
  if(view==='practice') app.innerHTML = renderPractice();
  else if(view==='mocktest') app.innerHTML = renderMock();
  else if(view==='bookmarks') app.innerHTML = renderBookmarks();
  else if(view==='stats') app.innerHTML = renderStats();
  attachHandlers();
}

/* ================= PRACTICE VIEW ================= */
function renderPractice(){
  const list = filteredQuestions();
  if(practiceIndex>=list.length) practiceIndex = 0;
  const q = list[practiceIndex];

  const subjPills = ['All','Physics','Chemistry','Maths'].map(s=>
    `<div class="pill ${filters.subject===s?'active':''}" data-subj="${s}" data-action="subject">
      <span>${s}</span><span class="count">${subjCount(s)}</span>
    </div>`).join('');

  const examOpts = ['All','IIT-JEE','AIEEE','JEE Main','JEE Advanced'];
  const examRadio = examOpts.map(e=>`
    <label><input type="radio" name="exam" value="${e}" ${filters.exam===e?'checked':''}> ${e}</label>
  `).join('');

  const yearChips = years().map(y=>
    `<div class="year-chip ${filters.year===y?'active':''}" data-year="${y}">${y}</div>`
  ).join('');

  const topicChips = ['All',...topicsFor(filters.subject)].map(t=>
    `<div class="topic-chip ${filters.topic===t?'active':''}" data-topic="${t}">${t}</div>`
  ).join('');

  const sidebar = `
    <div class="sidebar">
      <h3>Subject</h3>
      <div class="subject-pills">${subjPills}</div>
      <h3>Exam</h3>
      <div class="exam-radio" style="margin-bottom:20px;">${examRadio}</div>
      <h3>Year</h3>
      <div class="year-strip" style="margin-bottom:20px;">
        <div class="year-chip ${filters.year==='All'?'active':''}" data-year="All">All</div>
        ${yearChips}
      </div>
      <h3>Topic</h3>
      <div class="topic-chips">${topicChips}</div>
      <button class="reset-link" data-action="reset-filters">Reset all filters</button>
    </div>`;

  if(!q){
    return `<div class="grid">${sidebar}<div class="empty">No questions match these filters.<br>Try widening your search.</div></div>`;
  }

  const sel = selected[q.id];
  const isRevealed = !!revealed[q.id];
  const isBookmarked = progress.bookmarks.includes(q.id);

  const optionsHtml = q.options.map((opt,i)=>{
    let cls='option';
    if(isRevealed){
      if(i===q.answer) cls+=' correct';
      else if(i===sel) cls+=' wrong';
    } else if(sel===i){ cls+=' selected'; }
    return `<div class="${cls}" data-opt="${i}" data-action="select-option">
      <div class="omr">${String.fromCharCode(65+i)}</div>
      <div>${esc(opt)}</div>
    </div>`;
  }).join('');

  const main = `
    <div>
      <div class="notice"><b>About this question bank:</b> this seed set is a small, hand-written sample in the style and difficulty of real IIT-JEE / JEE Main / JEE Advanced papers (1978–2026) — not a scanned reproduction of copyrighted exam papers. Add your own archived papers to the <code>QUESTIONS</code> array in the code to grow it.</div>
      <div class="progress-line">Question ${practiceIndex+1} of ${list.length}</div>
      <div class="qcard">
        <div class="qmeta">
          <span class="tag" style="color:${SUBJ_COLOR[q.subject]||'var(--ink)'};border-color:${SUBJ_COLOR[q.subject]||'var(--line)'}">${q.subject}</span>
          <span class="tag">${q.exam} · ${q.year}</span>
          <span class="tag">${q.topic}</span>
          <span class="tag">${q.difficulty}</span>
        </div>
        <div class="qnum">Q.</div>
        <p class="qtext">${esc(q.q)}</p>
        <div class="options">${optionsHtml}</div>
        <div class="qactions">
          <button class="btn" data-action="reveal" ${isRevealed?'disabled':''}>${isRevealed?'Answer shown':'Show Answer'}</button>
          <button class="btn secondary" data-action="prev" ${practiceIndex===0?'disabled':''}>← Previous</button>
          <button class="btn secondary" data-action="next" ${practiceIndex>=list.length-1?'disabled':''}>Next →</button>
          <button class="btn ${isBookmarked?'bookmarked':'ghost'}" data-action="bookmark">${isBookmarked?'★ Bookmarked':'☆ Bookmark'}</button>
        </div>
        ${isRevealed?`<div class="solution-box"><span class="stamp-label">Official-style Solution</span><br>${esc(q.solution)}</div>`:''}
      </div>
    </div>`;

  return `<div class="grid">${sidebar}${main}</div>`;
}

/* ================= MOCK TEST VIEW ================= */
function renderMock(){
  if(mock.setup) return renderMockSetup();
  if(mock.submitted) return renderMockResults();
  return renderMockRunning();
}

function renderMockSetup(){
  return `
  <div class="setup-card">
    <h2>Set up your mock test</h2>
    <p class="desc">Simulated CBT-style test: OMR-style options, a live timer, and a question palette — just like exam day.</p>
    <div class="notice">Sample seed question bank (hand-written, JEE-style) spanning 1978–2026 — see Practice tab for details on expanding it with real papers.</div>
    <div class="form-row">
      <label>Subjects</label>
      <div class="check-row">
        <label><input type="checkbox" value="Physics" class="mock-subj" checked> Physics</label>
        <label><input type="checkbox" value="Chemistry" class="mock-subj" checked> Chemistry</label>
        <label><input type="checkbox" value="Maths" class="mock-subj" checked> Maths</label>
      </div>
    </div>
    <div class="form-row">
      <label>Number of questions</label>
      <input type="number" id="mock-count" min="5" max="${QUESTIONS.length}" value="15">
    </div>
    <div class="form-row">
      <label>Duration (minutes)</label>
      <input type="number" id="mock-duration" min="5" max="180" value="20">
    </div>
    <button class="btn" data-action="start-mock">Begin Test</button>
  </div>`;
}

function renderMockRunning(){
  const q = mock.questions[mock.index];
  const mins = Math.floor(mock.timeLeft/60), secs = mock.timeLeft%60;
  const low = mock.timeLeft <= 60;

  const optionsHtml = q.options.map((opt,i)=>{
    const sel = mock.answers[q.id];
    let cls='option'+(sel===i?' selected':'');
    return `<div class="${cls}" data-opt="${i}" data-action="mock-select">
      <div class="omr">${String.fromCharCode(65+i)}</div>
      <div>${esc(opt)}</div>
    </div>`;
  }).join('');

  const palette = mock.questions.map((qq,i)=>{
    let cls='pnode';
    if(i===mock.index) cls+=' current';
    if(mock.marked[qq.id]) cls+=' marked';
    else if(mock.answers[qq.id]!==undefined) cls+=' answered';
    return `<div class="${cls}" data-goto="${i}">${i+1}</div>`;
  }).join('');

  return `
    <div class="exam-header">
      <div style="font-family:var(--font-mono);font-size:13px;">Mock Test — Question ${mock.index+1} of ${mock.questions.length}</div>
      <div class="clock ${low?'low':''}">${String(mins).padStart(2,'0')}:${String(secs).padStart(2,'0')}</div>
    </div>
    <div class="mock-layout">
      <div>
        <div class="qcard">
          <div class="qmeta">
            <span class="tag" style="color:${SUBJ_COLOR[q.subject]||'var(--ink)'};border-color:${SUBJ_COLOR[q.subject]||'var(--line)'}">${q.subject}</span>
            <span class="tag">${q.exam} · ${q.year}</span>
            <span class="tag">${q.topic}</span>
          </div>
          <p class="qtext">${esc(q.q)}</p>
          <div class="options">${optionsHtml}</div>
          <div class="qactions">
            <button class="btn secondary" data-action="mock-prev" ${mock.index===0?'disabled':''}>← Previous</button>
            <button class="btn secondary" data-action="mock-next" ${mock.index>=mock.questions.length-1?'disabled':''}>Next →</button>
            <button class="btn ghost" data-action="mock-mark">${mock.marked[q.id]?'Unmark':'Mark for review'}</button>
            <button class="btn" data-action="mock-submit" style="margin-left:auto;background:var(--stamp);border-color:var(--stamp);">Submit Test</button>
          </div>
        </div>
      </div>
      <div class="palette">
        <h4>Question Palette</h4>
        <div class="palette-grid">${palette}</div>
        <div class="legend">
          <div><span class="dot" style="background:var(--correct)"></span>Answered</div>
          <div><span class="dot" style="background:var(--maths)"></span>Marked for review</div>
          <div><span class="dot" style="background:var(--paper-2);border:1px solid var(--line)"></span>Not visited</div>
        </div>
      </div>
    </div>`;
}

function renderMockResults(){
  const r = mock.result;
  const bySubj = r.bySubject;
  const rows = Object.keys(bySubj).map(s=>{
    const d = bySubj[s];
    const pct = d.total? Math.round(100*d.correct/d.total):0;
    return `<div class="bar-row">
      <div class="name">${s}</div>
      <div class="bar-track"><div class="bar-fill" style="width:${pct}%;background:${SUBJ_COLOR[s]||'var(--ink)'}"></div></div>
      <div class="pct">${pct}%</div>
    </div>`;
  }).join('');

  return `
  <div class="results-card">
    <div style="font-family:var(--font-mono);font-size:11px;letter-spacing:1px;color:var(--muted);text-transform:uppercase;">Result</div>
    <div class="score-big">${r.correct} / ${r.total}</div>
    <div style="font-family:var(--font-mono);font-size:13px;color:var(--muted);">Accuracy: ${r.accuracy}% · Time taken: ${r.timeTaken}</div>
    <div class="results-grid">
      <div class="rbox"><div class="label">Correct</div><div class="val" style="color:var(--correct)">${r.correct}</div></div>
      <div class="rbox"><div class="label">Incorrect</div><div class="val" style="color:var(--wrong)">${r.incorrect}</div></div>
      <div class="rbox"><div class="label">Unattempted</div><div class="val">${r.unattempted}</div></div>
    </div>
    <div style="text-align:left;margin-top:10px;">${rows}</div>
    <button class="btn" style="margin-top:10px;" data-action="mock-restart">Take another test</button>
  </div>`;
}

/* ================= BOOKMARKS VIEW ================= */
function renderBookmarks(){
  const items = QUESTIONS.filter(q=>progress.bookmarks.includes(q.id));
  if(items.length===0){
    return `<div class="empty">No bookmarks yet.<br>Tap ☆ Bookmark on any question in Practice mode to save it here.</div>`;
  }
  return `<div>${items.map(q=>`
    <div class="list-card">
      <div class="meta">${q.subject} · ${q.exam} · ${q.year} · ${q.topic}</div>
      <div class="qshort">${esc(q.q)}</div>
      <button class="btn ghost" data-action="unbookmark" data-id="${q.id}">Remove bookmark</button>
    </div>`).join('')}</div>`;
}

/* ================= STATS VIEW ================= */
function renderStats(){
  const attemptedIds = Object.keys(progress.attempts);
  const totalAttempted = attemptedIds.length;
  const totalCorrect = attemptedIds.filter(id=>progress.attempts[id].correct).length;
  const accuracy = totalAttempted? Math.round(100*totalCorrect/totalAttempted):0;
  const mockCount = progress.mockHistory.length;

  const subjects = ['Physics','Chemistry','Maths'];
  const subjBars = subjects.map(s=>{
    const ids = attemptedIds.filter(id=>{
      const q = QUESTIONS.find(x=>x.id===id); return q && q.subject===s;
    });
    const correct = ids.filter(id=>progress.attempts[id].correct).length;
    const pct = ids.length? Math.round(100*correct/ids.length):0;
    return `<div class="bar-row">
      <div class="name">${s}</div>
      <div class="bar-track"><div class="bar-fill" style="width:${pct}%;background:${SUBJ_COLOR[s]}"></div></div>
      <div class="pct">${pct}%</div>
    </div>`;
  }).join('');

  const history = progress.mockHistory.slice(-5).reverse().map(h=>`
    <div class="list-card">
      <div class="meta">${new Date(h.date).toLocaleDateString()} · ${h.timeTaken}</div>
      <div class="qshort">Score: ${h.correct}/${h.total} (${h.accuracy}% accuracy)</div>
    </div>`).join('') || `<div class="empty" style="padding:30px;">No mock tests taken yet.</div>`;

  return `
    <div>
      <div class="stats-grid">
        <div class="stat-card"><div class="num">${totalAttempted}</div><div class="lbl">Questions attempted</div></div>
        <div class="stat-card"><div class="num">${totalCorrect}</div><div class="lbl">Correct</div></div>
        <div class="stat-card"><div class="num">${accuracy}%</div><div class="lbl">Accuracy</div></div>
        <div class="stat-card"><div class="num">${mockCount}</div><div class="lbl">Mock tests taken</div></div>
      </div>
      <h3 style="font-family:var(--font-mono);font-size:12px;text-transform:uppercase;color:var(--muted);letter-spacing:1px;margin-bottom:14px;">Accuracy by subject</h3>
      ${subjBars}
      <h3 style="font-family:var(--font-mono);font-size:12px;text-transform:uppercase;color:var(--muted);letter-spacing:1px;margin:26px 0 14px;">Recent mock tests</h3>
      ${history}
    </div>`;
}

/* ================= EVENT HANDLING ================= */
function attachHandlers(){
  // Tabs
  document.querySelectorAll('#tabs button').forEach(b=>{
    b.onclick = ()=>{ view=b.dataset.view; render(); };
  });

  if(view==='practice'){
    document.querySelectorAll('[data-action="subject"]').forEach(el=>{
      el.onclick = ()=>{ filters.subject=el.dataset.subj; filters.topic='All'; practiceIndex=0; render(); };
    });
    document.querySelectorAll('input[name="exam"]').forEach(el=>{
      el.onchange = ()=>{ filters.exam=el.value; practiceIndex=0; render(); };
    });
    document.querySelectorAll('[data-year]').forEach(el=>{
      el.onclick = ()=>{
        const v = el.dataset.year;
        filters.year = v==='All'?'All':Number(v);
        practiceIndex=0; render();
      };
    });
    document.querySelectorAll('[data-topic]').forEach(el=>{
      el.onclick = ()=>{ filters.topic=el.dataset.topic; practiceIndex=0; render(); };
    });
    const resetBtn = document.querySelector('[data-action="reset-filters"]');
    if(resetBtn) resetBtn.onclick = ()=>{ filters={subject:'All',exam:'All',year:'All',topic:'All'}; practiceIndex=0; render(); };

    document.querySelectorAll('[data-action="select-option"]').forEach(el=>{
      el.onclick = ()=>{
        const list = filteredQuestions();
        const q = list[practiceIndex];
        if(revealed[q.id]) return;
        selected[q.id] = Number(el.dataset.opt);
        render();
      };
    });
    const revealBtn = document.querySelector('[data-action="reveal"]');
    if(revealBtn) revealBtn.onclick = ()=>{
      const list = filteredQuestions();
      const q = list[practiceIndex];
      revealed[q.id] = true;
      if(selected[q.id]!==undefined){
        const correct = selected[q.id]===q.answer;
        progress.attempts[q.id] = { correct };
        saveProgress();
      }
      render();
    };
    const prevBtn = document.querySelector('[data-action="prev"]');
    if(prevBtn) prevBtn.onclick = ()=>{ practiceIndex=Math.max(0,practiceIndex-1); render(); };
    const nextBtn = document.querySelector('[data-action="next"]');
    if(nextBtn) nextBtn.onclick = ()=>{ practiceIndex++; render(); };
    const bmBtn = document.querySelector('[data-action="bookmark"]');
    if(bmBtn) bmBtn.onclick = ()=>{
      const list = filteredQuestions();
      const q = list[practiceIndex];
      const i = progress.bookmarks.indexOf(q.id);
      if(i===-1) progress.bookmarks.push(q.id); else progress.bookmarks.splice(i,1);
      saveProgress(); render();
    };
  }

  if(view==='mocktest'){
    const startBtn = document.querySelector('[data-action="start-mock"]');
    if(startBtn) startBtn.onclick = startMock;

    document.querySelectorAll('[data-action="mock-select"]').forEach(el=>{
      el.onclick = ()=>{
        const q = mock.questions[mock.index];
        mock.answers[q.id] = Number(el.dataset.opt);
        render();
      };
    });
    const mPrev = document.querySelector('[data-action="mock-prev"]');
    if(mPrev) mPrev.onclick = ()=>{ mock.index=Math.max(0,mock.index-1); render(); };
    const mNext = document.querySelector('[data-action="mock-next"]');
    if(mNext) mNext.onclick = ()=>{ mock.index=Math.min(mock.questions.length-1,mock.index+1); render(); };
    const mMark = document.querySelector('[data-action="mock-mark"]');
    if(mMark) mMark.onclick = ()=>{
      const q = mock.questions[mock.index];
      mock.marked[q.id] = !mock.marked[q.id];
      render();
    };
    document.querySelectorAll('[data-goto]').forEach(el=>{
      el.onclick = ()=>{ mock.index=Number(el.dataset.goto); render(); };
    });
    const mSubmit = document.querySelector('[data-action="mock-submit"]');
    if(mSubmit) mSubmit.onclick = submitMock;
    const mRestart = document.querySelector('[data-action="mock-restart"]');
    if(mRestart) mRestart.onclick = ()=>{
      mock = { active:false, setup:true, questions:[], index:0, answers:{}, marked:{}, duration:0, timeLeft:0, timerId:null, submitted:false, result:null };
      render();
    };
  }

  if(view==='bookmarks'){
    document.querySelectorAll('[data-action="unbookmark"]').forEach(el=>{
      el.onclick = ()=>{
        const id = el.dataset.id;
        const i = progress.bookmarks.indexOf(id);
        if(i>-1) progress.bookmarks.splice(i,1);
        saveProgress(); render();
      };
    });
  }
}

/* ================= MOCK TEST LOGIC ================= */
function startMock(){
  const subjEls = document.querySelectorAll('.mock-subj:checked');
  const subjects = Array.from(subjEls).map(e=>e.value);
  const count = Math.max(5, Math.min(QUESTIONS.length, Number(document.getElementById('mock-count').value)||15));
  const duration = Math.max(5, Number(document.getElementById('mock-duration').value)||20);

  let pool = QUESTIONS.filter(q=>subjects.includes(q.subject));
  if(pool.length===0) pool = QUESTIONS.slice();
  // shuffle
  pool = pool.map(v=>({v,r:Math.random()})).sort((a,b)=>a.r-b.r).map(o=>o.v);
  const chosen = pool.slice(0, Math.min(count, pool.length));

  mock = {
    active:true, setup:false, questions:chosen, index:0, answers:{}, marked:{},
    duration:duration*60, timeLeft:duration*60, timerId:null, submitted:false, result:null, startTime:Date.now()
  };
  render();
  mock.timerId = setInterval(()=>{
    mock.timeLeft--;
    if(mock.timeLeft<=0){ clearInterval(mock.timerId); submitMock(); return; }
    // Only re-render the clock area lightly by full render (fine at this scale)
    if(view==='mocktest' && !mock.submitted) render();
  },1000);
}

function submitMock(){
  if(mock.timerId) clearInterval(mock.timerId);
  let correct=0, incorrect=0, unattempted=0;
  const bySubject = {};
  mock.questions.forEach(q=>{
    bySubject[q.subject] = bySubject[q.subject] || {correct:0,total:0};
    bySubject[q.subject].total++;
    const ans = mock.answers[q.id];
    if(ans===undefined){ unattempted++; }
    else if(ans===q.answer){ correct++; bySubject[q.subject].correct++; }
    else { incorrect++; }
    progress.attempts[q.id] = { correct: ans===q.answer };
  });
  const total = mock.questions.length;
  const accuracy = total? Math.round(100*correct/total):0;
  const elapsed = mock.duration - mock.timeLeft;
  const mm = Math.floor(elapsed/60), ss = elapsed%60;
  const timeTaken = `${mm}m ${ss}s`;

  mock.result = { correct, incorrect, unattempted, total, accuracy, timeTaken, bySubject };
  mock.submitted = true;

  progress.mockHistory.push({ date:Date.now(), correct, total, accuracy, timeTaken });
  saveProgress();
  render();
}

/* ================= INIT ================= */
(async function init(){
  await loadProgress();
  render();
})();
</script>
